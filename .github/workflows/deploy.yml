name: Deploy Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy Website
        run: |
          sudo rsync -av --delete \
            --exclude='.git' \
            --exclude='.github' \
            ./ /var/www/html/

      - name: Test Nginx Configuration
        run: sudo nginx -t

      - name: Restart Nginx
        run: sudo systemctl restart nginx

      - name: Check Nginx Status
        run: sudo systemctl status nginx --no-pager
